# ==============================================================================
# software.yaml — declarative, cross-platform tool manifest for setup-os
#
# Single source of truth for "apps I want on every machine".
# Everything installs through xbrew — that's what xbrew is for: one
# `xbrew install <name>` that auto-routes to brew / pacman / AUR / recipe per OS.
# Add a line, re-run install.sh, only the new tool gets installed (idempotent).
#
#   trust:  custom Homebrew taps to register FIRST, so xbrew's brew backend can
#           resolve formulae published there (our own tools on 2lab-ai/tap).
#   xbrew:  installed via `xbrew install`. Built-in recipes today: telegram,
#           slack, claude-code, nomachine, claude, rustdesk, sunshine, brew.
#           Anything else falls back to brew (incl. trusted taps) / pacman / AUR.
# ==============================================================================

trust:
  - 2lab-ai/tap

xbrew:
  - telegram
  - slack
  - claude-code
  - nomachine
  - codex
  - llmux
  - herdr-mx-preview
