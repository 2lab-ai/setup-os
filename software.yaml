# ==============================================================================
# software.yaml — declarative, cross-platform tool manifest for setup-os
#
# This is the single source of truth for "apps I want on every machine".
# The OS installers read it and install anything still missing (idempotent):
# add a line here, re-run install.sh, and only the new tool gets installed.
#
# Sections
#   xbrew:      installed via `xbrew install <name>` — routes to the right
#               backend (brew / pacman / AUR / curated recipe) per OS.
#               Built-in xbrew recipes today: telegram, slack, claude-code,
#               nomachine, claude, rustdesk, sunshine, brew. Anything else
#               falls back to the native package manager / AUR.
#   brew_taps:  custom Homebrew taps to register before installing brew tools.
#   brew:       installed straight from Homebrew — used for our own tools
#               published on 2lab-ai/tap (llmux, herdr-mx-preview).
# ==============================================================================

xbrew:
  - telegram
  - slack
  - claude-code
  - nomachine
  - codex

brew_taps:
  - 2lab-ai/tap

brew:
  - llmux
  - herdr-mx-preview
